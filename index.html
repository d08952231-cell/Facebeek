<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мессенджер</title>
  
  <!-- Подключаем Firebase и React напрямую -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    /* Стили интерфейса (Мобильные) */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0f172a; /* Темный фон */
      color: #f8fafc;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .app-card {
      width: 100%;
      max-width: 400px;
      background-color: #1e293b;
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    h1 { text-align: center; margin-bottom: 25px; font-size: 24px; }
    .subtitle { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 20px; word-wrap: break-word; }
    input {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      background-color: #334155;
      border: 1px solid #475569;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #64748b; }
    .code-input {
      text-align: center;
      font-size: 28px;
      letter-spacing: 10px;
      font-weight: bold;
    }
    button {
      width: 100%;
      padding: 15px;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 10px;
    }
    button:hover { background-color: #2563eb; }
    button:disabled { background-color: #475569; cursor: not-allowed; }
    .error-msg {
      color: #f87171;
      text-align: center;
      font-size: 14px;
      margin-bottom: 15px;
      min-height: 20px;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #64748b;
      font-size: 14px;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Настройки Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBX4UEgA_jYR1bW3dO1nm2FgWVbWKQCtJ4",
      authDomain: "my-messenger-app-66a89.firebaseapp.com",
      databaseURL: "https://my-messenger-app-66a89-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "my-messenger-app-66a89",
      storageBucket: "my-messenger-app-66a89.firebasestorage.app",
      messagingSenderId: "498516241258",
      appId: "1:498516241258:web:ff479da13d40d696681313"
    };
    
    // Инициализация Firebase
    const firebaseApp = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const h = React.createElement;

    function App() {
      const [step, setStep] = React.useState('form');
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState('');

      const [email, setEmail] = React.useState('');
      const [name, setName] = React.useState('');
      const [username, setUsername] = React.useState('');
      const [code, setCode] = React.useState('');

      // Шаг 1: Отправка кода на Vercel API
      const handleSendCode = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          const res = await fetch('/api/send-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, name, username })
          });
          const data = await res.json();
          if (data.error) setError(data.error);
          else setStep('code');
        } catch (err) {
          setError('Ошибка сети. Проверьте интернет.');
        } finally {
          setLoading(false);
        }
      };

      // Шаг 2: Проверка кода и регистрация через Vercel API
      const handleVerify = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          const res = await fetch('/api/verify-and-register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code })
          });
          const data = await res.json();
          
          if (data.error) {
            setError(data.error);
          } else {
            // Сохраняем профиль в Firebase Realtime DB
            db.ref('users/' + data.localId).set({
              name: data.name,
              username: data.username,
              email: email
            });
            alert('Регистрация прошла успешно! Добро пожаловать!');
          }
        } catch (err) {
          setError('Ошибка сети.');
        } finally {
          setLoading(false);
        }
      };

      // Рендер интерфейса
      return h('div', { className: 'app-card' },
        h('h1', null, 'Мессенджер'),
        h('div', { className: 'error-msg' }, error),
        
        step === 'form' ?
          // Форма регистрации
          h('form', { onSubmit: handleSendCode },
            h('div', { className: 'subtitle' }, 'Введите данные для регистрации'),
            h('input', { type: 'email', placeholder: 'Email', value: email, onChange: e => setEmail(e.target.value), required: true }),
            h('input', { type: 'text', placeholder: 'Имя', value: name, onChange: e => setName(e.target.value), required: true }),
            h('input', { type: 'text', placeholder: 'Username', value: username, onChange: e => setUsername(e.target.value), required: true }),
            h('button', { type: 'submit', disabled: loading }, loading ? 'Отправка...' : 'Получить код')
          )
        :
          // Форма ввода кода
          h('form', { onSubmit: handleVerify },
            h('div', { className: 'subtitle' }, 'Мы отправили код на ', h('b', null, email)),
            h('input', { className: 'code-input', type: 'text', placeholder: '------', value: code, onChange: e => setCode(e.target.value), required: true, maxLength: 6 }),
            h('button', { type: 'submit', disabled: loading }, loading ? 'Проверка...' : 'Подтвердить'),
            h('span', { className: 'back-link', onClick: () => { setStep('form'); setError(''); } }, 'Изменить данные')
          )
      );
    }

    // Запуск React приложения
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
